name: cpr_instructor_doc
description: "Offline BLS instructor class management, CCF testing, reports, Atlas export, and local digital records."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.6.0
dependencies:
  pdfx: ^2.0.0
  image_picker: '>=1.1.2'
  archive: ^4.0.0
  intl: ^0.20.2
  file_picker: '>=8.1.2'
  share_plus: ^10.1.4
  shared_preferences: ^2.0.0
  printing: ^5.0.0
  pdf: ^3.0.0
  crypto: ^3.0.0
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.0.0
  path: ^1.0.0
  drift_flutter: ^0.2.0
  drift: ^2.18.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  go_router: ^16.2.0
  provider: ^6.1.2

dev_dependencies:
  build_runner: ^2.0.0
  drift_dev: ^2.18.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
